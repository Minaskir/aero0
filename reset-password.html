<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Новый пароль — АэроКафе</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/styles.css">
	<link rel="stylesheet" href="./css/animations.css">
    <style>
        .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 450px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
	<header class="site-header">
		<div class="container header-inner">
			<a class="logo" href="/">АэроКафе</a>
		</div>
	</header>

	<main class="container auth-page">
		<div class="auth-card">
			<h1 style="margin-bottom: 24px; text-align: center; font-size: 24px;">Новый пароль</h1>
			<form id="resetForm" class="booking-form">
				<label>
					<span>Введите новый пароль</span>
					<input type="password" name="password" required minlength="6">
				</label>
				<label>
					<span>Подтвердите пароль</span>
					<input type="password" name="confirm" required minlength="6">
				</label>
				<button type="submit" class="button w-100" style="margin-top: 16px;">Обновить пароль</button>
			</form>
		</div>
	</main>

	<script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Токен отсутствует. Запросите сброс пароля заново.');
            window.location.href = '/auth.html';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = e.target.password.value;
            const confirm = e.target.confirm.value;

            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const result = await res.json();
                alert(result.message);
                
                if (res.ok) {
                    window.location.href = '/auth.html';
                }
            } catch (err) {
                alert('Ошибка сервера');
            }
        });
    </script>
</body>
</html>
